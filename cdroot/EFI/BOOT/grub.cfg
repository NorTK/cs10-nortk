# NorTK OS Live GRUB2 config (static, no variables)

set default=0
set timeout=10

if [ "$grub_platform" = "efi" ]; then
  insmod efi_gop
  insmod efi_uga
  insmod video_bochs
  insmod video_cirrus
  insmod all_video
else
  insmod all_video
fi

set gfxpayload=keep
set gfxmode=keep

insmod gzio
insmod part_gpt
insmod ext2
insmod fat
insmod search_fs_uuid
insmod search_fs_file

terminal_input console
terminal_output gfxterm

# Search for the live root (CD/DVD)
search --no-floppy --set=root --file /boot/x86_64/loader/linux || search --no-floppy --set=root --label NorTKOS

menuentry "Start NorTK OS (CentOS Stream 10)" --class fedora --class gnu-linux --class gnu --class os {
  linux /boot/x86_64/loader/linux root=live:LABEL=NorTKOS rd.live.image rd.live.overlay.persistent rd.live.overlay.cowfs=ext4 console=tty0 console=ttyS0,115200
  initrd /boot/x86_64/loader/initrd.img
}

menuentry "Test this media & start NorTK OS (CentOS Stream 10)" --class fedora --class gnu-linux --class gnu --class os {
  linux /boot/x86_64/loader/linux root=live:LABEL=NorTKOS rd.live.image rd.live.check rd.live.overlay.persistent rd.live.overlay.cowfs=ext4 console=tty0 console=ttyS0,115200
  initrd /boot/x86_64/loader/initrd.img
}

submenu "Troubleshooting -->" {
  menuentry "Start NorTK OS in basic graphics mode" --class fedora --class gnu-linux --class gnu --class os {
    linux /boot/x86_64/loader/linux root=live:LABEL=NorTKOS rd.live.image rd.live.overlay.persistent rd.live.overlay.cowfs=ext4 console=tty0 console=ttyS0,115200 nomodeset
    initrd /boot/x86_64/loader/initrd.img
  }
}

menuentry "Reboot" --class restart {
  reboot
}

menuentry "Shutdown" --class shutdown {
  halt
}
